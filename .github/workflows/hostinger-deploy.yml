name: Hostinger Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/data/**'
  workflow_dispatch:
    inputs:
      hostinger_sftp_host:
        description: 'HOSTINGER_SFTP_HOST (e.g. 72.61.80.236)'
        required: false
        type: string
      hostinger_sftp_user:
        description: 'HOSTINGER_SFTP_USER (e.g. root)'
        required: false
        type: string
      hostinger_sftp_key:
        description: 'CLOUDFLARE_API_TOKEN'
        required: false
        type: string
      cloudflare_api_token:
        description: 'CLOUDFLARE_API_TOKEN'
        required: false
        type: string
      cloudflare_account_id:
        description: 'CLOUDFLARE_ACCOUNT_ID'
        required: false
        type: string
  repository_dispatch:
    types: [webflow-update]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-hostinger:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      deploy_status: ${{ job.status }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Deploy to Hostinger via rsync + SSH key
        run: |
          HOST="${{ inputs.hostinger_sftp_host || secrets.HOSTINGER_SFTP_HOST }}"
          USER="${{ inputs.hostinger_sftp_user || secrets.HOSTINGER_SFTP_USER }}"
          KEY="${{ inputs.hostinger_sftp_key || secrets.HOSTINGER_SFTP_KEY }}"

          echo "=== SSH Key Debug Info ==="
          echo "KEY length: ${#KEY} chars"
          echo "KEY starts with: ${KEY:0:40}"
          echo "KEY ends with: ${KEY: -40}"
          echo "KEY contains OPEN SSH marker: $(echo "$KEY" | grep -c 'BEGIN OPENSSH')"
          echo "KEY contains RSA marker: $(echo "$KEY" | grep -c 'BEGIN RSA')"
          echo "KEY contains ED25519 marker: $(echo "$KEY" | grep -c 'BEGIN ED25519')"
          echo "KEY contains EC marker: $(echo "$KEY" | grep -c 'BEGIN EC')"

          mkdir -p ~/.ssh
          echo "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Private key written to ~/.ssh/deploy_key"

          echo "=== Private Key File Contents ==="
          cat ~/.ssh/deploy_key | head -3

          echo "=== SSH Key Permissions ==="
          ls -la ~/.ssh/deploy_key

          echo "=== Testing SSH with verbose output ==="
          ssh -v \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o PreferredAuthentications=publickey \
              -i "$HOME/.ssh/deploy_key" \
              "$USER@$HOST" echo "SSH key auth SUCCESS" 2>&1 | tee ssh_debug.log
          SSH_EXIT=$?
          echo "SSH exit code: $SSH_EXIT"

          if [ $SSH_EXIT -ne 0 ]; then
            echo "=== SSH Debug Log ==="
            cat ssh_debug.log
            echo "=== Available SSH debug auth methods ==="
            ssh -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=30 \
                -v \
                "$USER@$HOST" echo 2>&1 | grep -E "(Authentications|authentications|method|server|password)" || true
          fi

          echo "=== Starting rsync deployment ==="
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o PreferredAuthentications=publickey -i $HOME/.ssh/deploy_key" \
            --exclude='.git' --exclude='node_modules' --exclude='src' --exclude='.env' \
            ./ "$USER@$HOST:/public_html/" 2>&1 | tee rsync_debug.log
          RSYNC_EXIT=$?
          echo "rsync exit code: $RSYNC_EXIT"
          if [ $RSYNC_EXIT -ne 0 ]; then
            echo "=== rsync Debug Log ==="
            cat rsync_debug.log
          fi

          echo "Deployment complete!"

      - name: Verify deployment
        run: |
          echo 'Build artifact contains:'
          ls -la
          echo 'Hostinger deploy complete!'

  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.cloudflare_api_token != ''
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: s24-cms-content-site
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
