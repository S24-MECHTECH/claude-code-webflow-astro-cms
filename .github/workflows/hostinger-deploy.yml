name: Hostinger Deploy
on:
  push:
    branches: [main]
    paths:
      - 'src/data/**'
  workflow_dispatch:
  repository_dispatch:
    types: [webflow-update]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-hostinger:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Generate SSH key in runner
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -C "github-actions-realdollz" -f ~/.ssh/deploy_key -N "" -q
          echo "SSH_KEY<<EOF" >> $GITHUB_OUTPUT
          cat ~/.ssh/deploy_key >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "PUBLIC_KEY<<EOF" >> $GITHUB_OUTPUT
          cat ~/.ssh/deploy_key.pub >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Generated fresh ed25519 key pair in runner"
        id: gen_key

      - name: Add public key to server (via SSH)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOSTINGER_SFTP_HOST }}
          username: ${{ secrets.HOSTINGER_SFTP_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 22
          script: |
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            echo "${{ steps.gen_key.outputs.PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo "Key added to authorized_keys"
            # Verify key was added
            grep -c "${{ steps.gen_key.outputs.PUBLIC_KEY }}" ~/.ssh/authorized_keys || exit 1

      - name: Deploy to Hostinger via SFTP
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_SFTP_USER }}
          PORT: '22'
          SOURCE: './'
          TARGET: '/public_html/'
          SSH_KEY: ${{ steps.gen_key.outputs.SSH_KEY }}
          ARGS: '-rlvz --delete'
          EXCLUDE: '/.git/ /node_modules/ /src/ /.env*'

      - name: Verify deployment
        run: |
          echo 'Build artifact contains:'
          ls -la
          echo 'SFTP deploy complete!'

  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: s24-cms-content-site
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
