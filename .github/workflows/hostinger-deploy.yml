name: Hostinger Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/data/**'
  workflow_dispatch:
    inputs:
      hostinger_sftp_host:
        description: 'HOSTINGER_SFTP_HOST (e.g. 72.61.80.236)'
        required: false
        type: string
      hostinger_sftp_user:
        description: 'HOSTINGER_SFTP_USER (e.g. root)'
        required: false
        type: string
      hostinger_ssh_password:
        description: 'HOSTINGER_SSH_PASSWORD'
        required: false
        type: string
      cloudflare_api_token:
        description: 'CLOUDFLARE_API_TOKEN'
        required: false
        type: string
      cloudflare_account_id:
        description: 'CLOUDFLARE_ACCOUNT_ID'
        required: false
        type: string
  repository_dispatch:
    types: [webflow-update]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-hostinger:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      deploy_status: ${{ job.status }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Generate SSH key in runner
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -C "github-actions-realdollz" -f ~/.ssh/deploy_key -N "" -q
          echo "SSH_KEY<<EOF" >> $GITHUB_OUTPUT
          cat ~/.ssh/deploy_key >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "PUBLIC_KEY<<EOF" >> $GITHUB_OUTPUT
          cat ~/.ssh/deploy_key.pub >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Generated fresh ed25519 key pair in runner"
        id: gen_key

      - name: Install sshpass and rsync
        run: |
          apt-get update -qq && apt-get install -y -qq sshpass rsync > /dev/null 2>&1
          echo "sshpass version: $(sshpass -V | head -1)"
          echo "rsync version: $(rsync --version | head -1)"

      - name: Add public key to server and deploy via SSH
        run: |
          HOST="${{ inputs.hostinger_sftp_host || secrets.HOSTINGER_SFTP_HOST }}"
          USER="${{ inputs.hostinger_sftp_user || secrets.HOSTINGER_SFTP_USER }}"
          PASS="${{ inputs.hostinger_ssh_password || secrets.HOSTINGER_SSH_PASSWORD }}"
          PUB_KEY="${{ steps.gen_key.outputs.PUBLIC_KEY }}"

          # Step 1: Add the public key to the server using SSH with password
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o BatchMode=no "$USER@$HOST" << 'SSHEOF'
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            printf '%s\n' "$PUB_KEY" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo "Public key added to authorized_keys"
          SSHEOF

          # Step 2: Verify key-based SSH works
          echo "Verifying SSH key authentication..."
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o BatchMode=yes -o ConnectTimeout=10 \
              -i "$HOME/.ssh/deploy_key" "$USER@$HOST" echo "SSH key auth SUCCESS"

          # Step 3: Deploy using rsync over SSH with the generated key
          echo "Starting rsync deployment..."
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i $HOME/.ssh/deploy_key" \
            --exclude='.git' --exclude='node_modules' --exclude='src' --exclude='.env' \
            ./ "$USER@$HOST:/public_html/"

          echo "Deployment complete!"

        env:
          SSHPASS: ${{ inputs.hostinger_ssh_password || secrets.HOSTINGER_SSH_PASSWORD }}

      - name: Verify deployment
        run: |
          echo 'Build artifact contains:'
          ls -la
          echo 'SFTP deploy complete!'

  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.cloudflare_api_token != ''
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ inputs.cloudflare_api_token || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ inputs.cloudflare_account_id || secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: s24-cms-content-site
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
