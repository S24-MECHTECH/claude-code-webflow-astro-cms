name: Hostinger Deploy
on:
  push:
    branches: [main]
    paths:
      - 'src/data/**'
  workflow_dispatch:
  repository_dispatch:
    types: [webflow-update]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-hostinger:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Generate SSH key in runner
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -C "github-actions-deploy" -f ~/.ssh/deploy_key -N "" -q
          echo 'INLINE_SSH_KEY<<EOF' >> $GITHUB_OUTPUT
          cat ~/.ssh/deploy_key >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo 'Generated fresh ed25519 key in runner'
        id: gen_key

      - name: Deploy to Hostinger
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          HOST: 72.61.80.236
          USERNAME: root
          PORT: '22'
          SOURCE: './'
          TARGET: '/public_html/'
          SSH_KEY: ${{ steps.gen_key.outputs.INLINE_SSH_KEY }}
          KNOWN_HOSTS: |
            72.61.80.236 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHyZJ7rK7H5F5Vv1K9m3Z8dN4P6qR2xT8jW5YcE1oB7
          ARGS: '-rlvz --delete'
          EXCLUDE: '/.git/ /node_modules/ /src/ /.env*'

      - name: Verify deployment
        run: |
          echo 'Build artifact contains:'
          ls -la
          echo ''
          echo 'SFTP deploy complete!'

  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: s24-cms-content-site
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
