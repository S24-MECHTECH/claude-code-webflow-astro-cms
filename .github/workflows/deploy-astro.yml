name: Deploy Astro zu Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
  repository_dispatch:
    types: [webflow-sync, astro-deploy, webflow-update]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Astro bauen
        run: npm run build

      - name: Build-Inhalt prüfen
        run: |
          echo "=== dist/ Inhalt ==="
          ls -la dist/
          echo "=== HTML-Dateien ==="
          find dist/ -name "*.html" | head -20
          echo "=== Seiten-Anzahl ==="
          find dist/ -name "*.html" | wc -l

      - name: Zu Cloudflare Pages deployen
        env:
          CLOUDFLARE_API_TOKEN: cfat_RDDh5dfjqXmDcmX6nw3frfGExYWzRQL0CmKoMsWi956c1552
          CLOUDFLARE_ACCOUNT_ID: 38dad218e1092829145d4940b0f2292c
        run: npx wrangler pages deploy ./dist --project-name=s24-mechtech --commit-dirty=true
