# Astro Dual Deployment - Hostinger (realdollz.de + realdollz.cloud) + Cloudflare Pages
name: Deploy Astro to Hostinger & Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - '.github/workflows/**'
  repository_dispatch:
    types: [webflow-sync, astro-deploy]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # === HOSTINGER DEPLOYMENT (realdollz.de) ===
  deploy-hostinger-realdollz:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Deploy to Hostinger (realdollz.de)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SFTP_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
          SOURCE: 'dist'
          TARGET: '/home/u781914439/domains/realdollz.de/public_html'
          EXCLUDE: |
            .git
            .gitignore
            node_modules
            .env
            "*.log"
          ARGS: '--delete'

      - name: Verify Hostinger deployment (realdollz.de)
        run: |
          echo "Hostinger deployment complete"
          echo "Site: https://realdollz.de"

  # === HOSTINGER DEPLOYMENT (realdollz.cloud) ===
  deploy-hostinger-realdollz-cloud:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Deploy to Hostinger (realdollz.cloud)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SFTP_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
          SOURCE: 'dist'
          TARGET: '/home/u781914439/domains/yellowgreen-pelican-492933.hostingersite.com/public_html'
          EXCLUDE: |
            .git
            .gitignore
            node_modules
            .env
            "*.log"
          ARGS: '--delete'

      - name: Verify Hostinger deployment (realdollz.cloud)
        run: |
          echo "Hostinger deployment complete"
          echo "Site: https://realdollz.cloud"

  # === CLOUDFLARE PAGES DEPLOYMENT ===
  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: s24-cms-content-site
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Cloudflare deployment
        run: |
          echo "Cloudflare Pages deployment complete"
          echo "Project: s24-cms-content-site"
