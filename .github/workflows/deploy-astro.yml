# Astro Dual Deployment - Hostinger (realdollz.de + realdollz.cloud) + Cloudflare Pages
name: Deploy Astro to Hostinger & Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - '.github/workflows/**'
  repository_dispatch:
    types: [webflow-sync, astro-deploy]
  workflow_dispatch:

jobs:
  # === HOSTINGER DEPLOYMENT (realdollz.de) ===
  deploy-hostinger-realdollz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-hostinger
          path: build.log
          retention-days: 1

      - name: Deploy to Hostinger (realdollz.de)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SFTP_PORT }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
          SOURCE: 'dist'
          TARGET: '/home/u781914439/domains/realdollz.de/public_html'
          EXCLUDE: |
            .git
            .gitignore
            node_modules
            .env
            "*.log"
          ARGS: '--delete'

      - name: Verify Hostinger deployment (realdollz.de)
        run: |
          echo "Hostinger deployment complete"
          echo "Site: https://realdollz.de"

  # === HOSTINGER DEPLOYMENT (realdollz.cloud) ===
  deploy-hostinger-realdollz-cloud:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Deploy to Hostinger (realdollz.cloud)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SFTP_PORT }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
          SOURCE: 'dist'
          TARGET: '/home/u781914439/domains/yellowgreen-pelican-492933.hostingersite.com/public_html'
          EXCLUDE: |
            .git
            .gitignore
            node_modules
            .env
            "*.log"
          ARGS: '--delete'

      - name: Verify Hostinger deployment (realdollz.cloud)
        run: |
          echo "Hostinger deployment complete"
          echo "Site: https://realdollz.cloud"

  # === CLOUDFLARE PAGES DEPLOYMENT ===
  deploy-cloudflare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUADFLARE_API_TOKEN }}
          accountId: 38dad218e1092829145d4940b0f2292c
          projectName: s24-mechtech
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Cloudflare deployment
        if: success()
        run: |
          echo "Cloudflare Pages deployment complete"
          echo "Project: s24-mechtech"
