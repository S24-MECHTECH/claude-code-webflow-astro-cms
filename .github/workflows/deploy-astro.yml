name: Deploy Astro zu Hostinger VPS & Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
  repository_dispatch:
    types: [webflow-sync, astro-deploy, webflow-update]
  workflow_dispatch:

env:
  # SSH-Verbindung zum VPS (72.61.80.236 = srv1091615.hstgr.cloud)
  VPS_HOST: "72.61.80.236"
  VPS_USER: "root"
  # Webflow API Token (Fallback)
  WEBFLOW_API_TOKEN: ${{ github.event.client_payload.webflow_api_token || secrets.WEBFLOW_API_TOKEN || 'cb07f5cf4719b948ffe39b9a60de5ac10baf34968992975fae2e6f61efef5e2e' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Astro bauen
        run: npm run build
        env:
          WEBFLOW_API_TOKEN: ${{ env.WEBFLOW_API_TOKEN }}

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # === VPS DEPLOYMENT (realdollz.de via Traefik) ===
  deploy-vps:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Build-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          # Privater SSH-Key (direkt eingebettet für sofortige Funktionsfähigkeit)
          cat > ~/.ssh/deploy_key << 'SSHKEY'
          -----BEGIN OPENSSH PRIVATE KEY-----
          b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
          QyNTUxOQAAACDx/IT1XIrSVFva5anUePkBDQ8NBjYQLaONkSNBrJeClgAAAKg8dSjCPHUo
          wgAAAAtzc2gtZWQyNTUxOQAAACDx/IT1XIrSVFva5anUePkBDQ8NBjYQLaONkSNBrJeClg
          AAAEDTLE8CSvoUsWiPx1qS6sLv0Hyq30NwHB8T8wAefEYUjfH8hPVcitJUW9rlqdR4+QEN
          Dw0GNhAto42RI0Gsl4KWAAAAHmdpdGh1Yi1hY3Rpb25zLWRlcGxveS0yMDI2MDQwOQECAw
          QFBgc=
          -----END OPENSSH PRIVATE KEY-----
          SSHKEY
          # Einzeilige Version ohne Einrückungen
          printf '%s\n' \
            '-----BEGIN OPENSSH PRIVATE KEY-----' \
            'b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW' \
            'QyNTUxOQAAACDx/IT1XIrSVFva5anUePkBDQ8NBjYQLaONkSNBrJeClgAAAKg8dSjCPHUo' \
            'wgAAAAtzc2gtZWQyNTUxOQAAACDx/IT1XIrSVFva5anUePkBDQ8NBjYQLaONkSNBrJeClg' \
            'AAAEDTLE8CSvoUsWiPx1qS6sLv0Hyq30NwHB8T8wAefEYUjfH8hPVcitJUW9rlqdR4+QEN' \
            'Dw0GNhAto42RI0Gsl4KWAAAAHmdpdGh1Yi1hY3Rpb25zLWRlcGxveS0yMDI2MDQwOQECAw' \
            'QFBgc=' \
            '-----END OPENSSH PRIVATE KEY-----' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "SSH-Key gespeichert ($(wc -c < ~/.ssh/deploy_key) Bytes)"

      - name: Webserver-Verzeichnis auf VPS vorbereiten
        run: |
          ssh -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            -i ~/.ssh/deploy_key \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "mkdir -p /var/www/realdollz && echo 'Verzeichnis bereit'"

      - name: Via rsync auf VPS deployen
        run: |
          echo "=== Deploye nach VPS /var/www/realdollz ==="
          ls -la ./dist/ | head -10
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -i ~/.ssh/deploy_key" \
            --exclude='.git' --exclude='node_modules' --exclude='.env' \
            ./dist/ \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/var/www/realdollz/
          echo "Deploy abgeschlossen!"

      - name: Traefik-Routing für realdollz.de einrichten
        run: |
          ssh -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            -i ~/.ssh/deploy_key \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'REMOTE'
            # Prüfe ob nginx oder caddy verfügbar
            if command -v nginx &>/dev/null; then
              echo "nginx gefunden"
              cat > /etc/nginx/conf.d/realdollz.conf << 'NGINX'
          server {
              listen 80;
              server_name realdollz.de www.realdollz.de;
              root /var/www/realdollz;
              index index.html;
              location / {
                  try_files $uri $uri/ /index.html;
              }
          }
          NGINX
              nginx -t && nginx -s reload
            else
              # Statischen Server mit Python starten (Fallback)
              echo "Dateien deployed nach /var/www/realdollz"
              ls -la /var/www/realdollz/ | head -10
            fi
          REMOTE

      - name: Deployment verifizieren
        run: |
          ssh -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            -i ~/.ssh/deploy_key \
            ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "ls -la /var/www/realdollz/ | head -15 && echo '=== index.html ===' && head -5 /var/www/realdollz/index.html 2>/dev/null || echo 'index.html nicht gefunden'"

  # === CLOUDFLARE PAGES (realdollz.de Hauptdomain) ===
  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - name: Build-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Zu Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: s24-cms-content-site
          directory: ./dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
