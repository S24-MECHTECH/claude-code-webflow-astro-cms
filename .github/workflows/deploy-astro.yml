# Astro Dual Deployment - Hostinger (realdollz.de + realdollz.cloud) + Cloudflare Pages
name: Deploy Astro to Hostinger & Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - '.github/workflows/**'
  repository_dispatch:
    types: [webflow-sync, astro-deploy]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # === HOSTINGER DEPLOYMENT (realdollz.de) ===
  deploy-hostinger-realdollz:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      HOSTINGER_SFTP_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
      HOSTINGER_SFTP_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
      HOSTINGER_SFTP_KEY: ${{ secrets.HOSTINGER_SFTP_KEY }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Debug - Check secrets presence
        run: |
          echo "=== Secrets Debug ==="
          echo "HOST present: "${HOSTINGER_SFTP_HOST:+YES}" (${HOSTINGER_SFTP_HOST})"
          echo "USER present: "${HOSTINGER_SFTP_USER:+YES}" (${HOSTINGER_SFTP_USER})"
          echo "KEY length: "${#HOSTINGER_SFTP_KEY}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${HOSTINGER_SFTP_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Key stored, length:" $(wc -c < ~/.ssh/deploy_key)
          echo "First 30 chars:" $(head -c 30 ~/.ssh/deploy_key)

      - name: Test SSH connection with verbose debug
        run: |
          echo "=== SSH Connection Test ==="
          echo "Target: "${HOSTINGER_SFTP_USER}"@"${HOSTINGER_SFTP_HOST}
          echo "Key file exists:" $(test -f ~/.ssh/deploy_key && echo YES || echo NO)
          echo "Key permissions:" $(stat -c %a ~/.ssh/deploy_key 2>/dev/null || stat -f %Lp ~/.ssh/deploy_key 2>/dev/null)
          echo ""
          echo "--- Attempting SSH (verbose) ---"
          ssh -vvv \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o PreferredAuthentications=publickey \
            -i "$HOME/.ssh/deploy_key" \
            "${HOSTINGER_SFTP_USER}@${HOSTINGER_SFTP_HOST}" \
            'echo SSH_OK; uptime' 2>&1 | tee ssh_debug.log
          SSH_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "SSH exit code: "$SSH_EXIT
          echo "=== END SSH TEST ==="

      - name: Deploy via rsync (realdollz.de)
        run: |
          echo "=== RSYNC DEPLOY (realdollz.de) ==="
          echo "Source dir contents:"
          ls -la
          echo ""
          echo "dist/ contents:"
          ls -la dist/ 2>/dev/null || echo "dist/ not found"
          echo ""
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o PreferredAuthentications=publickey -i $HOME/.ssh/deploy_key" \
            --exclude='.git' --exclude='node_modules' --exclude='.env' \
            --exclude='*.log' --exclude='src' --exclude='public' --exclude='.github' \
            ./ \
            "${HOSTINGER_SFTP_USER}@${HOSTINGER_SFTP_HOST}:/home/u781914439/domains/realdollz.de/public_html/" 2>&1
          echo "rsync exit: "$?

      - name: Verify deployment (realdollz.de)
        run: |
          echo "Deployment step complete - realdollz.de"

  # === HOSTINGER DEPLOYMENT (realdollz.cloud) ===
  deploy-hostinger-realdollz-cloud:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      HOSTINGER_SFTP_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
      HOSTINGER_SFTP_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
      HOSTINGER_SFTP_KEY: ${{ secrets.HOSTINGER_SFTP_KEY }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${HOSTINGER_SFTP_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via rsync (realdollz.cloud)
        run: |
          echo "=== RSYNC DEPLOY (realdollz.cloud) ==="
          echo "Source dir contents:"
          ls -la
          echo ""
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o PreferredAuthentications=publickey -i $HOME/.ssh/deploy_key" \
            --exclude='.git' --exclude='node_modules' --exclude='.env' \
            --exclude='*.log' --exclude='src' --exclude='public' --exclude='.github' \
            ./ \
            "${HOSTINGER_SFTP_USER}@${HOSTINGER_SFTP_HOST}:/home/u781914439/domains/yellowgreen-pelican-492933.hostingersite.com/public_html/" 2>&1
          echo "rsync exit: "$?

      - name: Verify deployment (realdollz.cloud)
        run: |
          echo "Deployment step complete - realdollz.cloud"

  # === CLOUDFLARE PAGES DEPLOYMENT ===
  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Debug Cloudflare secrets
        run: |
          echo "=== Cloudflare Secrets Debug ==="
          echo "CLOUDFLARE_ACCOUNT_ID length:" ${#CLOUDFLARE_ACCOUNT_ID}
          echo "CLOUDFLARE_API_TOKEN length:" ${#CLOUDFLARE_API_TOKEN}
          echo "Current dir contents:"
          ls -la
          echo ""
          echo "dist/ contents:"
          ls -la dist/ 2>/dev/null || echo "dist/ not found"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: s24-cms-content-site
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Cloudflare deployment
        run: |
          echo "Cloudflare Pages deployment complete"
