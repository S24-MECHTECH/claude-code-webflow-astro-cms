# Astro Dual Deployment - Hostinger (realdollz.de + realdollz.cloud) + Cloudflare Pages
name: Deploy Astro to Hostinger & Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - '.github/workflows/**'
  repository_dispatch:
    types: [webflow-sync, astro-deploy]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # === HOSTINGER DEPLOYMENT (realdollz.de) ===
  deploy-hostinger-realdollz:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      HOSTINGER_SFTP_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
      HOSTINGER_SFTP_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
      HOSTINGER_SFTP_KEY: ${{ secrets.HOSTINGER_SFTP_KEY }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Debug secrets
        run: |
          echo "HOST present: "${{ secrets.HOSTINGER_SFTP_HOST:+YES }}
          echo "USER present: "${{ secrets.HOSTINGER_SFTP_USER:+YES }}
          echo "KEY length: ${#HOSTINGER_SFTP_KEY}"
          echo ""
          echo "Current dir: $(pwd)"
          echo "CWD contents: $(ls -la | head -10)"
          echo "index.html in CWD: $(test -f index.html && echo YES || echo NO)"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$HOSTINGER_SFTP_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Key stored, length: $(wc -c < ~/.ssh/deploy_key)"

      - name: Test SSH connection
        run: |
          echo "Testing SSH to $HOSTINGER_SFTP_USER@$HOSTINGER_SFTP_HOST"
          ssh -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -i ~/.ssh/deploy_key \
            $HOSTINGER_SFTP_USER@$HOSTINGER_SFTP_HOST \
            "echo 'SSH_OK' && ls -la public_html/ 2>&1 | head -20"

      - name: Deploy via rsync (realdollz.de)
        run: |
          echo "=== RSYNC DEPLOY (realdollz.de) ==="
          echo "Current dir: $(pwd)"
          echo "CWD contents:"
          ls -la
          echo ""
          echo "index.html in CWD: $(test -f index.html && echo YES || echo NO)"
          echo ""
          REMOTE_DIR="/home/u781914439/domains/realdollz.de/public_html"
          echo "Remote dir: $REMOTE_DIR"
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -i ~/.ssh/deploy_key" \
            --exclude='.git' --exclude='node_modules' --exclude='.env' \
            --exclude='*.log' --exclude='src' --exclude='public' --exclude='.github' \
            ./ \
            $HOSTINGER_SFTP_USER@$HOSTINGER_SFTP_HOST:$REMOTE_DIR/
          EXIT=$?
          echo "rsync exit code: $EXIT"
          if [ $EXIT -ne 0 ]; then echo "RSYNC_FAILED"; exit 1; fi
          echo "RSYNC_OK"

      - name: Verify deployment (realdollz.de)
        run: |
          echo "Verifying remote files..."
          ssh -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            -i ~/.ssh/deploy_key \
            $HOSTINGER_SFTP_USER@$HOSTINGER_SFTP_HOST \
            "ls -la /home/u781914439/domains/realdollz.de/public_html/ | head -15"

  # === HOSTINGER DEPLOYMENT (realdollz.cloud) ===
  deploy-hostinger-realdollz-cloud:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      HOSTINGER_SFTP_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
      HOSTINGER_SFTP_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
      HOSTINGER_SFTP_KEY: ${{ secrets.HOSTINGER_SFTP_KEY }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Debug secrets
        run: |
          echo "HOST present: "${{ secrets.HOSTINGER_SFTP_HOST:+YES }}
          echo "USER present: "${{ secrets.HOSTINGER_SFTP_USER:+YES }}
          echo "KEY length: ${#HOSTINGER_SFTP_KEY}"
          echo "index.html in CWD: $(test -f index.html && echo YES || echo NO)"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$HOSTINGER_SFTP_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Key stored, length: $(wc -c < ~/.ssh/deploy_key)"

      - name: Check remote path
        run: |
          echo "Checking remote path before deploy..."
          ssh -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -i ~/.ssh/deploy_key \
            $HOSTINGER_SFTP_USER@$HOSTINGER_SFTP_HOST \
            "echo 'SSH_OK' && ls -la /home/u781914439/domains/ 2>&1 | head -10 && ls -la /home/u781914439/domains/yellowgreen-pelican-492933.hostingersite.com/public_html/ 2>&1 | head -10"

      - name: Deploy via rsync (realdollz.cloud)
        run: |
          echo "=== RSYNC DEPLOY (realdollz.cloud) ==="
          echo "Current dir: $(pwd)"
          ls -la
          echo ""
          echo "index.html in CWD: $(test -f index.html && echo YES || echo NO)"
          echo ""
          REMOTE_DIR="/home/u781914439/domains/yellowgreen-pelican-492933.hostingersite.com/public_html"
          echo "Remote dir: $REMOTE_DIR"
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -i ~/.ssh/deploy_key" \
            --exclude='.git' --exclude='node_modules' --exclude='.env' \
            --exclude='*.log' --exclude='src' --exclude='public' --exclude='.github' \
            ./ \
            $HOSTINGER_SFTP_USER@$HOSTINGER_SFTP_HOST:$REMOTE_DIR/
          EXIT=$?
          echo "rsync exit code: $EXIT"
          if [ $EXIT -ne 0 ]; then echo "RSYNC_FAILED"; exit 1; fi
          echo "RSYNC_OK"

      - name: Verify deployment (realdollz.cloud)
        run: |
          echo "Verifying remote files..."
          ssh -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            -i ~/.ssh/deploy_key \
            $HOSTINGER_SFTP_USER@$HOSTINGER_SFTP_HOST \
            "ls -la /home/u781914439/domains/yellowgreen-pelican-492933.hostingersite.com/public_html/ | head -15"

  # === CLOUDFLARE PAGES DEPLOYMENT ===
  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Debug Cloudflare setup
        run: |
          echo "=== Cloudflare Debug ==="
          echo "ACCOUNT_ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "API_TOKEN length: ${#CLOUDFLARE_API_TOKEN}"
          echo ""
          echo "Current dir: $(pwd)"
          echo "CWD contents:"
          ls -la
          echo ""
          echo "index.html in CWD: $(test -f index.html && echo YES || echo NO)"
          echo "dist/ exists: $(test -d dist && echo YES || echo NO)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: s24-cms-content-site
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Cloudflare deployment
        run: |
          echo "Cloudflare Pages deployment complete"
