name: Webflow Sync
on:
  repository_dispatch:
    types: [webflow-update]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Webflow Data
        run: |
          node -e "
            const https = require('https');
            const apiToken = process.env.WEBFLOW_API_TOKEN;
            const siteId = '6826b5c28a9bb669ef7d7b1f';
            const options = {
              hostname: 'api.webflow.com',
              path: '/v1/sites/' + siteId + '/collections',
              headers: { 'Authorization': 'Bearer ' + apiToken, 'Accept': 'application/json' }
            };
            https.get(options, res => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                try {
                  const collections = JSON.parse(data);
                  console.log('Collections:', JSON.stringify(collections, null, 2));
                } catch(e) {
                  console.error('Parse error:', e.message);
                  console.log('Raw data:', data.substring(0, 500));
                }
              });
            }).on('error', e => console.error('Request error:', e.message));
          "
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}

      - name: Commit data
        run: |
          git config user.name 'github-actions[bot]' || true
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com' || true
          git add src/data/
          if git diff --staged --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'chore: sync Webflow data'
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
