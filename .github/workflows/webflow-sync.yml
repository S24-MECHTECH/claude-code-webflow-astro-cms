# Webflow CMS Sync - Astro Cloud Integration
name: Sync Webflow to Astro

on:
  repository_dispatch:
    types: [webflow-update]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main, hostinger-sftp]
    paths:
      - 'src/data/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch Webflow CMS Data
        run: |
          curl -s -X GET "https://api.webflow.com/v2/collections/68d361b0271a5d106adb4d4a/items?limit=100" \
            -H "Authorization: Bearer ${{ secrets.WEBFLOW_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -o src/data/webflow-items.json
          echo "Fetched $(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/webflow-items.json', 'utf8')).items.length)") items"
      
      # NOTE: Astro reads directly from webflow-items.json (no transformation needed)
      # The transform-webflow.js script was for v1 API which used different field names.
      # Webflow v2 API returns fieldData with correct field names (hero-heading-2, content-article, etc.)
      # that match what src/lib/webflow.ts expects.
      
      - name: Commit Changes
        run: |
          git config user.name "Webflow Sync Bot"
          git config user.email "bot@s24-mechtech.de"
          git add src/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync: Webflow CMS update $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Trigger Astro Deployment
        if: success()
        run: |
          echo "Triggering Astro deployment..."
          curl -X POST https://api.github.com/repos/S24-MECHTECH/astro-blog-starter-template/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d '{"event_type":"astro-deploy"}'
