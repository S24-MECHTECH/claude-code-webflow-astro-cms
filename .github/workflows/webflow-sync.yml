name: Webflow Sync

# Trigger: repository_dispatch (von n8n) ODER manuell (workflow_dispatch)
on:
  repository_dispatch:
    types: [webflow-update]
  workflow_dispatch:
    inputs:
      webflow_api_token:
        description: 'WEBFLOW_API_TOKEN — Webflow API Access Token'
        required: false
        type: string
      collection_id:
        description: 'Webflow Collection ID (aus .env: S24_CMS_CONTENT_SIDES)'
        required: false
        type: string
      site_id:
        description: 'Webflow Site ID (aus .env: WEBFLOW_SITE_ID)'
        required: false
        type: string
      webflow_api_token_secret:
        description: 'WEBFLOW_API_TOKEN via GitHub Secret (fallback)'
        required: false
        type: string

env:
  COLLECTION_ID: ${{ inputs.collection_id || github.event.client_payload.collection_id || '68d361b0271a5d106adb4d4a' }}
  SITE_ID: ${{ inputs.site_id || github.event.client_payload.site_id || '68d2fd81a3e41128755efbe7' }}
  WEBFLOW_API_TOKEN: ${{ inputs.webflow_api_token || github.event.client_payload.webflow_api_token || inputs.webflow_api_token_secret || secrets.WEBFLOW_API_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug env
        run: |
          echo "COLLECTION_ID: $COLLECTION_ID"
          echo "SITE_ID: $SITE_ID"
          echo "WEBFLOW_API_TOKEN set: $([ -n \"$WEBFLOW_API_TOKEN\" ] && echo 'YES' || echo 'NO (empty)')"
          echo "GitHub event: ${{ github.event_name }}"
          echo "Client payload: ${{ toJSON(github.event.client_payload) }}"

      - name: Fetch Webflow items
        id: fetch
        run: |
          cat << 'SCRIPT' > /tmp/fetch-webflow.js
          const https = require('https');
          const fs = require('fs');

          const token = process.env.WEBFLOW_API_TOKEN;
          const collectionId = process.env.COLLECTION_ID;
          const allItems = [];
          const limit = 100;

          function fetchPage(offset) {
            return new Promise((resolve, reject) => {
              const url = `https://api.webflow.com/v2/collections/${collectionId}/items?limit=${limit}&offset=${offset}`;
              console.log(`Fetching offset=${offset}...`);

              const req = https.request(url, {
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Accept': 'application/json',
                  'User-Agent': 'GitHub-Actions-Webflow-Sync/2.0'
                }
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  if (res.statusCode !== 200) {
                    console.error(`HTTP ${res.statusCode}: ${data}`);
                    reject(new Error(`Webflow API error: ${res.statusCode}`));
                    return;
                  }
                  try {
                    const json = JSON.parse(data);
                    const items = json.items || [];
                    console.log(`  Got ${items.length} items (total: ${json.total || 'unknown'})`);
                    allItems.push(...items);
                    if (items.length === limit) {
                      fetchPage(offset + limit).then(resolve).catch(reject);
                    } else {
                      resolve();
                    }
                  } catch (e) {
                    reject(e);
                  }
                });
              });
              req.on('error', reject);
              req.setTimeout(30000, () => { req.destroy(); reject(new Error('Request timeout')); });
              req.end();
            });
          }

          fetchPage(0).then(() => {
            console.log(`Total items fetched: ${allItems.length}`);
            fs.writeFileSync('/tmp/webflow-items.json', JSON.stringify(allItems, null, 2));
            console.log('Saved to /tmp/webflow-items.json');
          }).catch(e => {
            console.error('Fetch failed:', e.message);
            process.exit(1);
          });
          SCRIPT

          node /tmp/fetch-webflow.js

      - name: Transform to Astro data format
        run: |
          cat << 'SCRIPT' > /tmp/transform.js
          const fs = require('fs');

          // Webflow API v2 returns items with fieldData nested
          const raw = JSON.parse(fs.readFileSync('/tmp/webflow-items.json', 'utf8'));

          // Support both v1 (flat) and v2 (fieldData) response shapes
          function extractFields(item) {
            if (item.fieldData) {
              return { ...item.fieldData, _id: item.id, _archived: item.isArchived, _draft: item.isDraft };
            }
            return item;
          }

          const items = raw.map(extractFields);

          // Helper: safely extract URL from Link-type field
          function getLink(val) {
            if (!val) return '';
            if (typeof val === 'string') return val;
            if (typeof val === 'object') return val.url || val.href || '';
            return String(val);
          }

          // Helper: safely extract URL from Image-type field
          function getImage(val) {
            if (!val) return '';
            if (typeof val === 'string') return val;
            if (typeof val === 'object') return val.url || val.fileId || '';
            return '';
          }

          // Map Webflow items to Astro-compatible format
          // Field slugs match exactly the Webflow collection schema (S24_cms_content_sides)
          const posts = items
            .filter(item => !item._archived && !item._draft)
            .map(item => {
              const slug = item.slug || (item.name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

              return {
                id: item._id,
                slug: slug,
                name: item.name || slug || 'Untitled',
                title: item.title || item.name || '',

                // === SEO Fields ===
                'seo-title': item['seo-title'] || item.name || '',
                'seo-description': item['seo-description'] || '',
                'keywords-2': item['keywords-2'] || '',
                'keyword-2': item['keyword-2'] || '',
                'de-de': item['de-de'] || '',

                // === Product Fields ===
                brand: item.brand || '',
                model: item.model || '',
                ean: item.ean || '',
                price: item.price || '',
                currency: item.currency || 'EUR',
                tax: item.tax || '',
                categories: item.categories || '',
                shipping: item.shipping || '',
                description: item.description || '',

                // === Hero Section ===
                'hero-heading-2': item['hero-heading-2'] || item.name || '',
                'hero-subheading-2': item['hero-subheading-2'] || '',
                'hero-cta-text': item['hero-cta-text'] || '',
                'hero-cta-url': getLink(item['hero-cta-url']),
                'hero-footer-url': getLink(item['hero-footer-url']),
                'hero-banner-url': getLink(item['hero-banner-url']),
                'hero-ready': item['hero-ready'] || false,
                'hero-alt': item['hero-alt'] || '',
                'hero-banner': getImage(item['hero-banner']),
                'hero-footer': getImage(item['hero-footer']),
                'hero-img-2': getImage(item['hero-img-2']),
                'hero-banner-footer': getImage(item['hero-banner-footer']),

                // === Banner Fields ===
                'banner-text-2': item['banner-text-2'] || '',
                'banner-url': item['banner-url'] || '',
                'banner-alt': item['banner-alt'] || '',
                'banner-img-2': getImage(item['banner-img-2']),
                'banner-image': getImage(item['banner-image']),
                'banner-image-footer': getImage(item['banner-image-footer']),

                // === Article / Image URLs (Link type in Webflow) ===
                'article-url-2': getLink(item['article-url-2']),
                'image-url-3': getLink(item['image-url-3']),
                'logo-url-3': getLink(item['logo-url-3']),
                'article-image-url-2': getLink(item['article-image-url-2']),
                'cta-link': getLink(item['cta-link']),

                // === Article Image Fields ===
                'article-image': getImage(item['article-image']),
                'article-alt': item['article-alt'] || '',
                'alt-text-2': item['alt-text-2'] || '',

                // === Logo Fields ===
                'logo-img-2': getImage(item['logo-img-2']),
                'logo-alt': item['logo-alt'] || '',

                // === Open Graph Fields ===
                'og-title-2': item['og-title-2'] || item.name || '',
                'og-description-2': item['og-description-2'] || '',
                'og-type': item['og-type'] || 'website',
                'og-locale': item['og-locale'] || 'de_DE',
                'og-site-name': item['og-site-name'] || '',
                'og-slug': item['og-slug'] || slug,
                'og-brand': item['og-brand'] || item.brand || '',
                'og-model': item['og-model'] || item.model || '',
                'og-footer-url': item['og-footer-url'] || '',
                'og-url': getLink(item['og-url']),
                'og-image-3': getImage(item['og-image-3']),

                // === Footer Fields ===
                'footer-url': getLink(item['footer-url']),
                'footer-text': item['footer-text'] || '',
                'footer-alt-text': item['footer-alt-text'] || '',
                'footer-img': getImage(item['footer-img']),

                // === Content Fields ===
                'content-article': item['content-article'] || '',
                'faq-section': item['faq-section'] || '',

                // === Meta ===
                'published-on': item['published-on'] || null,
                'updated-at': item['updated-at'] || null,
                'created-on': item['created-on'] || null,
                _archived: item._archived || false,
                _draft: item._draft || false,
              };
            });

          console.log(`Transformed ${posts.length} posts`);

          // Write src/data/posts.json
          const outputDir = 'src/data';
          if (!fs.existsSync(outputDir)) fs.mkdirSync(outputDir, { recursive: true });
          fs.writeFileSync(`${outputDir}/posts.json`, JSON.stringify(posts, null, 2));
          console.log(`Written to ${outputDir}/posts.json`);

          // Write individual slug files for Astro dynamic routing
          const postDir = 'src/data/posts';
          if (!fs.existsSync(postDir)) fs.mkdirSync(postDir, { recursive: true });
          posts.forEach(post => {
            fs.writeFileSync(`${postDir}/${post.slug}.json`, JSON.stringify(post, null, 2));
          });
          console.log(`Written ${posts.length} individual post files to src/data/posts/`);
          SCRIPT

          node /tmp/transform.js

      - name: Show changes
        run: |
          echo "=== Data files changed ==="
          git diff --stat src/data/ || echo "(no previous data)"

          echo "=== Posts summary ==="
          if [ -f src/data/posts.json ]; then
            echo "Posts count: $(node -e "console.log(require('./src/data/posts.json').length)")"
            node -e "
              const posts = require('./src/data/posts.json');
              posts.slice(0,3).forEach(p => console.log('  - ' + p.slug + ': ' + p.name));
              if (posts.length > 3) console.log('  ... and ' + (posts.length-3) + ' more');
            "
          fi

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Only commit if data actually changed
          if git diff --quiet src/data/; then
            echo "No data changes — skipping commit"
          else
            git add src/data/
            git commit -m "chore: sync Webflow data $(date -u '+%Y-%m-%dT%H:%M:%SZ')

            Triggered by: ${{ github.event_name }}
            Collection: ${{ env.COLLECTION_ID }}
            Items: $(node -e "try{console.log(require('./src/data/posts.json').length)}catch(e){console.log('?')}")"
            git push
            echo "Data pushed to GitHub!"
          fi
