name: Webflow to Data

# Post-processing: transformiert Webflow Collections in Astro-spezifische Data-Files
# Wird nach webflow-sync.yml ausgeführt ODER separat für einzelne Collection-Typen
on:
  repository_dispatch:
    types: [webflow-data-update]
  workflow_dispatch:
    inputs:
      webflow_api_token:
        description: 'WEBFLOW_API_TOKEN'
        required: false
        type: string
      # Collection types to sync (comma-separated): categories,products,skus,all
      collection_types:
        description: 'Collection types: categories,products,skus,all (default: all)'
        required: false
        default: 'all'
        type: string

env:
  WEBFLOW_API_TOKEN: ${{ inputs.webflow_api_token || github.event.client_payload.webflow_api_token || secrets.WEBFLOW_API_TOKEN }}
  SITE_ID: ${{ github.event.client_payload.site_id || '68d2fd81a3e41128755efbe7' }}
  COLLECTION_CATEGORIES: ${{ github.event.client_payload.collection_categories || '68f41d17b3ceaa52d1e9bab1' }}
  COLLECTION_PRODUCTS: ${{ github.event.client_payload.collection_products || '68f41d17b3ceaa52d1e9bab2' }}
  COLLECTION_SKUS: ${{ github.event.client_payload.collection_skus || '68f41d17b3ceaa52d1e9bab3' }}

jobs:
  sync-categories:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch categories
        run: |
          node -e "
            const https = require('https');
            const fs = require('fs');

            const token = process.env.WEBFLOW_API_TOKEN;
            const collectionId = process.env.COLLECTION_CATEGORIES;
            const siteId = process.env.SITE_ID;

            const allItems = [];
            function fetchPage(offset) {
              return new Promise((resolve, reject) => {
                const url = \`https://api.webflow.com/v2/sites/\${siteId}/collections/\${collectionId}/items?limit=100&offset=\${offset}\`;
                const req = https.request(url, {
                  headers: { 'Authorization': \`Bearer \${token}\`, 'Accept': 'application/json', 'User-Agent': 'GitHub-Actions/1.0' }
                }, (res) => {
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => {
                    if (res.statusCode !== 200) { console.error('Error:', data); reject(new Error(res.statusCode+'')); return; }
                    const json = JSON.parse(data);
                    allItems.push(...(json.items || []));
                    if ((json.items || []).length === 100) fetchPage(offset + 100).then(resolve).catch(reject);
                    else resolve();
                  });
                });
                req.on('error', reject);
                req.end();
              });
            }

            fetchPage(0).then(() => {
              const categories = allItems.filter(i => !i._archived && !i._draft).map(i => ({
                id: i._id, slug: i.slug || '', name: i.name || '',
                description: i.description || '', 'updated-at': i['updated-at']
              }));
              const dir = 'src/data/collections';
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
              fs.writeFileSync(dir + '/categories.json', JSON.stringify(categories, null, 2));
              console.log('Categories:', categories.length);
            }).catch(e => { console.error(e.message); process.exit(1); });
          "

      - name: Commit
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          if git diff --quiet src/data/; then
            echo "No changes"
          else
            git add src/data/
            git commit -m "chore: sync categories $(date -u '+%Y-%m-%dT%H:%M:%SZ')" && git push
          fi

  sync-products:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch products
        run: |
          node -e "
            const https = require('https');
            const fs = require('fs');

            const token = process.env.WEBFLOW_API_TOKEN;
            const collectionId = process.env.COLLECTION_PRODUCTS;
            const siteId = process.env.SITE_ID;

            const allItems = [];
            function fetchPage(offset) {
              return new Promise((resolve, reject) => {
                const url = \`https://api.webflow.com/v2/sites/\${siteId}/collections/\${collectionId}/items?limit=100&offset=\${offset}\`;
                const req = https.request(url, {
                  headers: { 'Authorization': \`Bearer \${token}\`, 'Accept': 'application/json', 'User-Agent': 'GitHub-Actions/1.0' }
