                req.end();
              });
            }

            fetchPage(0).then(() => {
              const products = allItems.filter(i => !i._archived && !i._draft).map(i => ({
                id: i._id, slug: i.slug || '', name: i.name || '',
                brand: i.brand || '', model: i.model || '', ean: i.ean || '',
                price: i.price || '', currency: i.currency || '',
                description: i.description || '', 'updated-at': i['updated-at']
              }));
              const dir = 'src/data/collections';
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
