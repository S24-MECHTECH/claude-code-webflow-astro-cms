name: Fix Missing Secrets

# Run manually to set required secrets
on:
  workflow_dispatch:
    inputs:
      hostinger_sftp_host:
        description: 'HOSTINGER_SFTP_HOST (e.g. 72.61.80.236)'
        required: true
        type: string
      hostinger_sftp_user:
        description: 'HOSTINGER_SFTP_USER (e.g. root)'
        required: true
        type: string
      hostinger_ssh_password:
        description: 'HOSTINGER_SSH_PASSWORD'
        required: true
        type: string
      cloudflare_api_token:
        description: 'CLOUDFLARE_API_TOKEN'
        required: true
        type: string
      cloudflare_account_id:
        description: 'CLOUDFLARE_ACCOUNT_ID'
        required: true
        type: string

permissions:
  actions: write
  contents: write
  id-token: write

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Set secrets via GitHub API
        id: set-secrets
        env:
          HOSTINGER_SFTP_HOST: ${{ inputs.hostinger_sftp_host }}
          HOSTINGER_SFTP_USER: ${{ inputs.hostinger_sftp_user }}
          HOSTINGER_SSH_PASSWORD: ${{ inputs.hostinger_ssh_password }}
          CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node << 'NODESCRIPT'
          const https = require('https');
          const { execSync } = require('child_process');
          const path = require('path');
          const os = require('os');

          const TOKEN = process.env.GITHUB_TOKEN;
          const REPO = process.env.GITHUB_REPOSITORY;
          const [OWNER, NAME] = REPO.split('/');

          console.log('=== TOKEN CHECK ===');
          console.log('Token prefix:', TOKEN.substring(0, 8) + '...');
          console.log('Token is PAT:', TOKEN.startsWith('github_pat_'));
          console.log('====================');

          function gh(method, path, body) {
            return new Promise((res, rej) => {
              const data = body ? JSON.stringify(body) : undefined;
              const opts = {
                hostname: 'api.github.com', path, method,
                headers: {
                  'Authorization': 'Bearer ' + TOKEN,
                  'User-Agent': 'node',
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json'
                }
              };
              if (data) opts.headers['Content-Length'] = Buffer.byteLength(data);
              const req = https.request(opts, r => {
                let d = ''; r.on('data', c => d += c);
                r.on('end', () => {
                  try { res({ s: r.statusCode, b: JSON.parse(d) }); }
                  catch (e) { res({ s: r.statusCode, b: d }); }
                });
              });
              req.on('error', rej);
              if (data) req.write(data);
              req.end();
            });
          }

          // Install tweetnacl in temp dir for XSalsa20-Poly1305 (GitHub's sealed box format)
          const tmpDir = path.join(os.tmpdir(), 'nacl-tmp-' + Date.now());
          require('fs').mkdirSync(tmpDir, { recursive: true });
          require('fs').writeFileSync(path.join(tmpDir, 'package.json'), '{}');
          process.chdir(tmpDir);
          console.log('Installing tweetnacl in', tmpDir);
          execSync('npm install tweetnacl tweetnacl-util', { stdio: 'inherit' });
          const nacl = require(path.join(tmpDir, 'node_modules', 'tweetnacl'));
          const util = require(path.join(tmpDir, 'node_modules', 'tweetnacl-util'));

          function encryptSecret(publicKeyBase64, secret) {
            const pubKey = util.decodeBase64(publicKeyBase64);
            const plaintext = new TextEncoder().encode(secret);
            // nacl.box creates: nonce(24) + ciphertext (anonymous sealed box)
            const boxed = nacl.box(plaintext, null, pubKey);
            return util.encodeBase64(boxed);
          }

          const secrets = [
            { name: 'HOSTINGER_SFTP_HOST', value: process.env.HOSTINGER_SFTP_HOST },
            { name: 'HOSTINGER_SFTP_USER', value: process.env.HOSTINGER_SFTP_USER },
            { name: 'HOSTINGER_SSH_PASSWORD', value: process.env.HOSTINGER_SSH_PASSWORD },
            { name: 'CLOUDFLARE_API_TOKEN', value: process.env.CLOUDFLARE_API_TOKEN },
            { name: 'CLOUDFLARE_ACCOUNT_ID', value: process.env.CLOUDFLARE_ACCOUNT_ID },
          ];

          async function main() {
            console.log('Setting secrets for', REPO);

            // Get public key
            console.log('Fetching public key from /repos/' + OWNER + '/' + NAME + '/actions/secrets/public-key');
            const keyResp = await gh('GET', '/repos/' + OWNER + '/' + NAME + '/actions/secrets/public-key');
            console.log('Public key status:', keyResp.s);
            if (keyResp.s !== 200) {
              console.error('Failed to get public key:', JSON.stringify(keyResp.b));
              process.exit(1);
            }
            const { key_id, key } = keyResp.b;
            console.log('Got public key, ID:', key_id, '| Key length:', key.length);

            for (const secret of secrets) {
              if (!secret.value || secret.value === 'USER_NEEDS_TO_PROVIDE' || secret.value === 'SKIP') {
                console.log('Skipping', secret.name, '(placeholder/empty)');
                continue;
              }
              const encrypted = encryptSecret(key, secret.value);
              const putResp = await gh('PUT',
                '/repos/' + OWNER + '/' + NAME + '/actions/secrets/' + secret.name,
                { encrypted_value: encrypted, key_id: key_id }
              );
              if (putResp.s === 201 || putResp.s === 204) {
                console.log('OK:', secret.name);
              } else {
                console.error('FAIL:', secret.name, putResp.s, JSON.stringify(putResp.b));
                process.exit(1);
              }
            }
            console.log('\nAll secrets set successfully!');
          }

          main().catch(err => { console.error(err); process.exit(1); });
          NODESCRIPT
