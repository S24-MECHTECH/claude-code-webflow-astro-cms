name: Fix Missing Secrets

# Run manually to set required secrets
on:
  workflow_dispatch:
    inputs:
      hostinger_sftp_host:
        description: 'HOSTINGER_SFTP_HOST (e.g. 72.61.80.236)'
        required: true
        type: string
      hostinger_sftp_user:
        description: 'HOSTINGER_SFTP_USER (e.g. root)'
        required: true
        type: string
      hostinger_ssh_password:
        description: 'HOSTINGER_SSH_PASSWORD'
        required: true
        type: string
      cloudflare_api_token:
        description: 'CLOUDFLARE_API_TOKEN'
        required: true
        type: string
      cloudflare_account_id:
        description: 'CLOUDFLARE_ACCOUNT_ID'
        required: true
        type: string

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check gh CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "Installing GitHub CLI..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            apt-get update -qq && apt-get install -y gh
          fi
          gh auth status

      - name: Set secrets via gh CLI
        env:
          HOSTINGER_SFTP_HOST: ${{ inputs.hostinger_sftp_host }}
          HOSTINGER_SFTP_USER: ${{ inputs.hostinger_sftp_user }}
          HOSTINGER_SSH_PASSWORD: ${{ inputs.hostinger_ssh_password }}
          CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
        run: |
          gh secret set HOSTINGER_SFTP_HOST --body "$HOSTINGER_SFTP_HOST"
          gh secret set HOSTINGER_SFTP_USER --body "$HOSTINGER_SFTP_USER"
          gh secret set HOSTINGER_SSH_PASSWORD --body "$HOSTINGER_SSH_PASSWORD"
          gh secret set CLOUDFLARE_API_TOKEN --body "$CLOUDFLARE_API_TOKEN"
          gh secret set CLOUDFLARE_ACCOUNT_ID --body "$CLOUDFLARE_ACCOUNT_ID"
          echo "All secrets set!"
          gh secret list
