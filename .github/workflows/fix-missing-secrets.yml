name: Fix Missing Secrets

# Run manually to set required secrets
on:
  workflow_dispatch:
    inputs:
      hostinger_sftp_host:
        description: 'HOSTINGER_SFTP_HOST (e.g. 72.61.80.236)'
        required: true
        type: string
      hostinger_sftp_user:
        description: 'HOSTINGER_SFTP_USER (e.g. root)'
        required: true
        type: string
      hostinger_ssh_password:
        description: 'HOSTINGER_SSH_PASSWORD'
        required: true
        type: string
      cloudflare_api_token:
        description: 'CLOUDFLARE_API_TOKEN'
        required: true
        type: string
      cloudflare_account_id:
        description: 'CLOUDFLARE_ACCOUNT_ID'
        required: true
        type: string

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set secrets via GitHub API + Node.js
        env:
          HOSTINGER_SFTP_HOST: ${{ inputs.hostinger_sftp_host }}
          HOSTINGER_SFTP_USER: ${{ inputs.hostinger_sftp_user }}
          HOSTINGER_SSH_PASSWORD: ${{ inputs.hostinger_ssh_password }}
          CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use Node.js to set secrets via GitHub Actions API
          # (No external dependencies needed — Node.js crypto is built-in)
          node -e "
            const https = require('https');
            const { crypto } = require('crypto');

            const TOKEN = process.env.GITHUB_TOKEN;
            const OWNER = '${{ github.repository_owner }}';
            const REPO = '${{ github.event.repository.name }}';

            const SECRETS = {
              HOSTINGER_SFTP_HOST: process.env.HOSTINGER_SFTP_HOST,
              HOSTINGER_SFTP_USER: process.env.HOSTINGER_SFTP_USER,
              HOSTINGER_SSH_PASSWORD: process.env.HOSTINGER_SSH_PASSWORD,
              CLOUDFLARE_API_TOKEN: process.env.CLOUDFLARE_API_TOKEN,
              CLOUDFLARE_ACCOUNT_ID: process.env.CLOUDFLARE_ACCOUNT_ID,
            };

            function gh(method, path, body) {
              return new Promise((res, rej) => {
                const data = body ? JSON.stringify(body) : undefined;
                const opts = {
                  hostname: 'api.github.com', path, method,
                  headers: {
                    Authorization: 'Bearer ' + TOKEN,
                    'User-Agent': 'actions-set-secrets',
                    Accept: 'application/vnd.github+json',
                    'Content-Type': 'application/json',
                  }
                };
                if (data) opts.headers['Content-Length'] = Buffer.byteLength(data);
                const req = https.request(opts, r => {
                  let d = '';
                  r.on('data', c => d += c);
                  r.on('end', () => {
                    try { res({ s: r.statusCode, b: JSON.parse(d) }); }
                    catch (e) { res({ s: r.statusCode, b: d }); }
                  });
                });
                req.on('error', rej);
                if (data) req.write(data);
                req.end();
              });
            }

            async function setSecret(name, value) {
              // Step 1: Get repo public key
              const keyResp = await gh('GET', '/repos/' + OWNER + '/' + REPO + '/actions/secrets/public-key');
              if (keyResp.s !== 200 || !keyResp.b.key_id) {
                console.error('Failed to get public key for', name, ':', JSON.stringify(keyResp));
                return false;
              }
              const { key_id, key: pubKeyBase64 } = keyResp.b;

              // Step 2: Encrypt using Node.js built-in crypto (Curve25519 / libsodium sealed box)
              // GitHub uses libsodium's crypto_box_seal which is equivalent to
              // crypto_box_seal (ephemeral key exchange + crypto_secretbox)
              const pubKeyBytes = Buffer.from(pubKeyBase64, 'base64');
              const msgBytes = Buffer.from(value, 'utf8');

              // Use libsodium-wrappers simulation via Node crypto
              // GitHub secrets use libsodium's crypto_box_seal (SealedBox with X25519 + BLAKE2b + XChaCha20Poly1305)
              // We simulate with Node's crypto using X25519 + ChaCha20-Poly1305
              const { ecdh, randomBytes, createCipheriv, createDecipheriv } = crypto;

              // Generate ephemeral keypair for key exchange
              const ephemeralX25519 = crypto.createKeyPairSync('x25519');
              const ephemeralPub = ephemeralX25519.publicKey;
              const ephemeralPriv = ephemeralX25519.privateKey;

              // Compute shared secret via ECDH (X25519)
              const sharedSecret = crypto.diffieHellman({
                publicKey: pubKeyBytes,
                privateKey: ephemeralPriv,
                outputEncoding: 'binary'
              });

              // Derive encryption key from shared secret (libsodium uses BLAKE2b for this)
              const nonce = randomBytes(24);
              const derivedKey = crypto.createHash('sha512')
                .update(Buffer.from(sharedSecret + 'SecEr_Channel_KEY', 'binary'))
                .digest().slice(0, 32);

              // Encrypt with ChaCha20-Poly1305
              const cipher = crypto.createCipheriv('chacha20', derivedKey, nonce);
              const encrypted = Buffer.concat([cipher.update(msgBytes), cipher.final()]);
              const tag = cipher.getAuthTag();

              // Assemble: ephemeral_pub(32) + nonce(24) + ciphertext + tag(16) — libsodium seal format
              const sealedBox = Buffer.concat([ephemeralPub, nonce, encrypted, tag]);
              const encryptedValue = sealedBox.toString('base64');

              // Step 3: PUT the secret
              const putResp = await gh('PUT',
                '/repos/' + OWNER + '/' + REPO + '/actions/secrets/' + name,
                { encrypted_value: encryptedValue, key_id }
              );

              if (putResp.s === 201 || putResp.s === 204 || putResp.s === 200) {
                console.log('✓ Secret', name, 'set successfully');
                return true;
              } else {
                console.error('✗ Failed to set', name, ':', putResp.s, JSON.stringify(putResp.b));
                return false;
              }
            }

            async function main() {
              console.log('Setting secrets for', OWNER + '/' + REPO + '...');
              let allOk = true;
              for (const [name, value] of Object.entries(SECRETS)) {
                if (value && value !== 'USER_NEEDS_TO_PROVIDE') {
                  const ok = await setSecret(name, value);
                  if (!ok) allOk = false;
                } else {
                  console.log('⊘ Skipping', name, '(placeholder value)');
                }
              }
              if (allOk) {
                console.log('\\nAll secrets set successfully!');
              } else {
                console.error('\\nSome secrets failed to set. Check errors above.');
                process.exit(1);
              }
            }

            main().catch(e => { console.error(e); process.exit(1); });
          "
